name: Daily Product Sync

on:
  schedule:
    - cron: '0 6 * * *'  # Runs daily at 6:00 AM UTC
  workflow_dispatch:  # Manual trigger option
  push:
    branches:
      - main

jobs:
  sync-products:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Auto Research Engine
        run: node auto_research_engine.js
        env:
          NODE_ENV: production

      - name: Sync Products to Route
        run: node scripts/sync-products.js

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "📦 Auto-sync: Updated mall products (daily sync)"
          file_pattern: |
            app/api/mall/products/route.ts
            data/products.json
